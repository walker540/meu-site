
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 Boys - Inscrição para a Festa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            overflow-x: hidden;
        }
        
        .font-display {
            font-family: 'Bebas Neue', sans-serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #FFD700;
            border-radius: 4px;
        }

        /* Animated Background */
        .bg-gradient-animate {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            opacity: 0.15;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Noise Texture */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Input Styling */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .input-field {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #FFD700;
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            transition: color 0.3s ease;
        }

        .input-field:focus + .input-icon {
            color: #FFD700;
        }

        /* Floating Label */
        .floating-label {
            position: absolute;
            left: 3rem;
            top: 1rem;
            color: #9ca3af;
            pointer-events: none;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .input-field:focus ~ .floating-label,
        .input-field:not(:placeholder-shown) ~ .floating-label {
            top: -0.6rem;
            left: 0.8rem;
            font-size: 0.75rem;
            color: #FFD700;
            background: #1a1a1a;
            padding: 0 0.4rem;
            border-radius: 4px;
        }

        /* Star Animation */
        .star {
            color: #FFD700;
            animation: pulse-star 2s infinite;
            display: inline-block;
        }
        
        @keyframes pulse-star {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* Button Glow */
        .btn-glow {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(255, 215, 0, 0.5);
        }

        .btn-glow::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }

        .btn-glow:hover::after {
            animation: shine 0.5s ease-in-out;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); opacity: 0; }
        }

        /* Success Modal */
        .modal {
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #FFD700;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Background Effects -->
    <div class="bg-gradient-animate"></div>
    <div class="noise"></div>

    <!-- Main Container -->
    <div class="w-full max-w-lg relative z-10">
        
        <!-- Header / Logo Section -->
        <div class="text-center mb-8 transform hover:scale-105 transition-transform duration-300">
            <div class="inline-block relative">
                <h1 class="font-display text-7xl md:text-8xl text-white tracking-wider mb-2 drop-shadow-2xl">
                    50 BOYS
                </h1>
                <div class="flex justify-center gap-2 text-3xl mb-4">
                    <span class="star" style="animation-delay: 0s">★</span>
                    <span class="star" style="animation-delay: 0.1s">★</span>
                    <span class="star" style="animation-delay: 0.2s">★</span>
                    <span class="star" style="animation-delay: 0.3s">★</span>
                    <span class="star" style="animation-delay: 0.4s">★</span>
                </div>
                <div class="absolute -top-4 -right-4 w-16 h-16 bg-yellow-500 rounded-full blur-3xl opacity-20 animate-pulse"></div>
                <div class="absolute -bottom-4 -left-4 w-20 h-20 bg-purple-500 rounded-full blur-3xl opacity-20 animate-pulse" style="animation-delay: 1s;"></div>
            </div>
            <p class="text-gray-400 text-lg tracking-widest uppercase font-light">Inscrição Exclusiva sobre a festa de enceramento da escola que vai ser organizado pelo 50 boys</p>
        </div>

        <!-- Form Card -->
        <div class="glass-card rounded-2xl p-8 md:p-10 relative overflow-hidden">
            <!-- Decorative Elements -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-yellow-500 to-transparent opacity-50"></div>
            
            <form id="registrationForm" class="space-y-6" onsubmit="handleSubmit(event)">
                
                <!-- Nome -->
                <div class="input-group">
                    <input type="text" id="nome" class="input-field" placeholder=" " required>
                    <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    <label for="nome" class="floating-label">Nome Completo</label>
                </div>

                <!-- Turma -->
                <div class="input-group">
                    <input type="text" id="turma" class="input-field" placeholder=" " required>
                    <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                    <label for="turma" class="floating-label">Turma</label>
                </div>

                <!-- Telefone -->
                <div class="input-group">
                    <input type="tel" id="telefone" class="input-field" placeholder=" " required pattern="[0-9+\s()-]+">
                    <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                    </svg>
                    <label for="telefone" class="floating-label">Número de Telefone</label>
                </div>

                <!-- Nível de Escolaridade -->
                <div class="input-group">
                    <select id="escolaridade" class="input-field appearance-none cursor-pointer" required style="padding-left: 3rem;">
                        <option value="" disabled selected></option>
                        <option value="Ensino Médio">9°Ano</option>
                        <option value="Universidade - Licenciatura">10°Ano</option>
                        <option value="Universidade - Mestrado">11°Ano</option>
                        <option value="Universidade - Doutoramento">12°Ano</option>
                        <option value="Outro">Outro</option>
                    </select>
                    <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
                    </svg>
                    <label for="escolaridade" class="floating-label">Nível de Escolaridade</label>
                    <svg class="absolute right-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </div>

                <!-- Motivação -->
                <div class="input-group">
                    <textarea id="motivacao" rows="3" class="input-field resize-none" placeholder=" " required style="padding-top: 1rem;"></textarea>
                    <svg class="input-icon w-5 h-5 top-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
                    </svg>
                    <label for="motivacao" class="floating-label">O que te motiva a participar?</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-glow w-full bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-bold py-4 px-6 rounded-xl text-lg uppercase tracking-wider flex items-center justify-center gap-2 group">
                    <span>Confirmar Inscrição</span>
                    <svg class="w-5 h-5 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                    </svg>
                </button>

            </form>

            <!-- Footer -->
            <div class="mt-6 text-center">
                <p class="text-gray-500 text-sm">Ao inscrever-se, será redirecionado para o WhatsApp</p>
            </div>
        </div>

        <!-- Decorative Bottom Text -->
        <div class="text-center mt-8 opacity-50">
            <p class="text-xs text-gray-600 uppercase tracking-[0.3em]">Organização 50 Boys © 2026</p>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 backdrop-blur-sm">
        <div class="glass-card rounded-2xl p-8 max-w-md w-full text-center transform scale-95 transition-transform duration-300" id="modalContent">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-green-500/50">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-display text-white mb-2">Inscrição Recebida!</h2>
            <p class="text-gray-300 mb-6">Redirecionando para o WhatsApp dos 50 Boys...</p>
            <div class="w-full bg-gray-700 rounded-full h-2 mb-4 overflow-hidden">
                <div class="bg-green-500 h-full rounded-full animate-[loading_2s_ease-in-out]" style="width: 100%"></div>
            </div>
        </div>
    </div>

    <script>
        // Input Animation Enhancement
        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('transform', 'scale-[1.02]');
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('transform', 'scale-[1.02]');
            });
        });

        // Form Submission Handler
        function handleSubmit(e) {
            e.preventDefault();
            
            // Get values
            const nome = document.getElementById('nome').value;
            const turma = document.getElementById('turma').value;
            const telefone = document.getElementById('telefone').value;
            const escolaridade = document.getElementById('escolaridade').value;
            const motivacao = document.getElementById('motivacao').value;

            // Create message
            const mensagem = `*Nova Inscrição - 50 Boys*%0A%0A` +
                           `*Nome:* ${nome}%0A` +
                           `*Turma:* ${turma}%0A` +
                           `*Telefone:* ${telefone}%0A` +
                           `*Escolaridade:* ${escolaridade}%0A` +
                           `*Motivação:* ${motivacao}%0A%0A` +
                           `_Enviado via site de inscrição_`;

            // Show success modal
            const modal = document.getElementById('successModal');
            const modalContent = document.getElementById('modalContent');
            modal.classList.add('active');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');

            // Create confetti
            createConfetti();

            // Redirect to WhatsApp after delay
            setTimeout(() => {
                window.location.href = `https://wa.me/245955405368?text=${mensagem}`;
            }, 2500);
        }

        // Confetti Effect
        function createConfetti() {
            const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.opacity = Math.random();
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        // Add loading animation style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes loading {
                0% { width: 0%; }
                100% { width: 100%; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
